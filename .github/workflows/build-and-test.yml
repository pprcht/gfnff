name: Build and Test

on:
  push:
  pull_request:

jobs:
  # ── CMake ────────────────────────────────────────────────────────────────────
  cmake:
    name: CMake (gcc-${{ matrix.compiler_version }}, ${{ matrix.build_type }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        compiler_version: [12, 13]
        build_type: [Debug, RelWithDebInfo]

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Install compilers and dependencies
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y \
            gcc-${{ matrix.compiler_version }} \
            g++-${{ matrix.compiler_version }} \
            gfortran-${{ matrix.compiler_version }} \
            libopenblas-dev

          echo "CC=gcc-${{ matrix.compiler_version }}" >> $GITHUB_ENV
          echo "CXX=g++-${{ matrix.compiler_version }}" >> $GITHUB_ENV
          echo "FC=gfortran-${{ matrix.compiler_version }}" >> $GITHUB_ENV

      - name: Configure with CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=${{ env.CC }} \
            -DCMAKE_CXX_COMPILER=${{ env.CXX }} \
            -DCMAKE_Fortran_COMPILER=${{ env.FC }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: |
          ctest --test-dir build \
                --output-on-failure \
                -R '^gfnff/'

  # ── Meson ────────────────────────────────────────────────────────────────────
  meson:
    name: Meson (gcc-${{ matrix.compiler_version }}, ${{ matrix.build_type }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        compiler_version: [12, 13]
        build_type: [debug, debugoptimized]

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Install compilers and dependencies
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y \
            gcc-${{ matrix.compiler_version }} \
            g++-${{ matrix.compiler_version }} \
            gfortran-${{ matrix.compiler_version }} \
            libopenblas-dev
          pip install meson ninja

          # CC/CXX/FC are picked up from the environment by Meson
          echo "CC=gcc-${{ matrix.compiler_version }}" >> $GITHUB_ENV
          echo "CXX=g++-${{ matrix.compiler_version }}" >> $GITHUB_ENV
          echo "FC=gfortran-${{ matrix.compiler_version }}" >> $GITHUB_ENV

      - name: Configure with Meson
        run: |
          meson setup build \
            --buildtype=${{ matrix.build_type }} \
            --warnlevel=0 \
            -Dtests=true

      - name: Build
        run: ninja -C build

      - name: Test
        run: meson test -C build --print-errorlogs
