#
# Build binary wheels for PyPI using cibuildwheel.
# Triggered on version tags (v*) or manually via workflow_dispatch.
#
# Platform coverage:
#   Linux  x86_64   : ubuntu-latest runner, manylinux2014
#   Linux  aarch64  : ubuntu-24.04-arm runner (native, no QEMU)
#   macOS  arm64    : macos-14 runner (Apple Silicon, Homebrew gfortran)
#   Windows         : not yet supported (requires mingw-w64 gfortran in CI)
#
# OpenMP note:
#   find_package(OpenMP) in CMakeLists.txt is intentionally non-fatal.
#   On macOS, Apple Clang (C/CXX) has no native OpenMP; Homebrew gfortran
#   does.  CMake detects OpenMP_Fortran_FOUND and enables it for Fortran only.
#
# Dependency bundling:
#   Linux  : auditwheel repair (run automatically by cibuildwheel) bundles
#            libgfortran.so and libgomp.so into the wheel.
#   macOS  : delocate bundles Homebrew gfortran runtime dylibs.
#
# macOS runner pinned to macos-14:
#   Homebrew compiles gcc dylibs against the host OS.  On macOS 15 (macos-latest)
#   the dylibs carry minOS=15.0, which delocate-wheel rejects for a 14.0 wheel.
#   macos-14 produces dylibs with minOS=14.0, matching MACOSX_DEPLOYMENT_TARGET.
#
# Linux aarch64 runner:
#   QEMU emulation on x86_64 is 10-20x slower than native.  ubuntu-24.04-arm
#   provides a native arm64 runner (free for public repos).

name: Build wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archs: x86_64
          - os: ubuntu-24.04-arm
            archs: aarch64
          - os: macos-14
            archs: arm64

    steps:
      - uses: actions/checkout@v5

      - name: Install gfortran (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install gcc
          # Homebrew installs gfortran as gfortran-NN; find the highest version
          # and symlink it to a plain 'gfortran' name for CMake to discover.
          GFORTRANS=$(ls "$(brew --prefix)"/bin/gfortran-[0-9]* 2>/dev/null || true)
          if [ -z "$GFORTRANS" ]; then
            echo "No gfortran-* binary found after brew install gcc" >&2; exit 1
          fi
          GFORTRAN_BIN=$(printf '%s\n' $GFORTRANS | sort -t- -k2,2n | tail -n1)
          echo "Using Fortran compiler: $GFORTRAN_BIN"
          ln -sf "$GFORTRAN_BIN" "$(brew --prefix)/bin/gfortran"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.19
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux*"
          CIBW_ARCHS: ${{ matrix.archs }}

          # Install gfortran and BLAS/LAPACK inside the manylinux container.
          # openblas-devel is only in EPEL for x86_64; use the reference
          # lapack-devel + blas-devel (CentOS 7 base, all archs) for aarch64.
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y gcc-gfortran
            if [ "$(uname -m)" = "x86_64" ]; then
              yum install -y openblas-devel
            else
              yum install -y lapack-devel blas-devel
            fi

          CIBW_ENVIRONMENT_LINUX: >
            FC=gfortran
            CMAKE_BUILD_PARALLEL_LEVEL=4

          CIBW_ENVIRONMENT_MACOS: >
            FC=gfortran
            MACOSX_DEPLOYMENT_TARGET=14.0
            CMAKE_BUILD_PARALLEL_LEVEL=4

          # auditwheel repair runs automatically on Linux; delocate on macOS.
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel --require-archs {delocate_archs}
            -w {dest_dir} -v {wheel}

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Upload to TestPyPI on manual workflow_dispatch (any branch, no tag needed)
  # ---------------------------------------------------------------------------
  upload_testpypi:
    name: Upload to TestPyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/gfnff
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ---------------------------------------------------------------------------
  # Collect all wheels and upload to PyPI on tagged releases
  # ---------------------------------------------------------------------------
  upload_pypi:
    name: Upload to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/gfnff
    permissions:
      id-token: write  # OIDC trusted publishing
      contents: write  # needed to create a GitHub Release

    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} dist/*.whl --generate-notes --repo ${{ github.repository }}
